<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard - CaBel Bordados</title>

    <!-- Bootstrap -->
    <link href="../assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <!-- Seu CSS -->
    <link rel="stylesheet" href="../style.css">

</head>

<body>
    <div class="header-mobile">

        <button class="menu-toggle" onclick="toggleSidebar()">
            ☰
        </button>

        <img src="../imgs/logo2.png" class="logo-header">

    </div>

    <div class="container-fluid">

        <div class="row">

            <!-- SIDEBAR -->
            <aside class="col-md-3 col-lg-2 sidebar">

                <img src="../imgs/logo.png" class="logo">

                <div class="menu">
                    <a href="dashboard.html" class="menu-btn active">Dashboard</a>
                    <a href="clientes.html" class="menu-btn">Clientes</a>
                    <a href="pedidos.html" class="menu-btn">Pedidos</a>
                    <a href="estoque.html" class="menu-btn">Estoque</a>
                    <a href="financeiro.html" class="menu-btn">Financeiro</a>
                    <a href="login.html" class="menu-btn logout">Sair</a>
                </div>

            </aside>

            <!-- MAIN -->
            <main class="col-md-9 col-lg-10 main">

                <!-- TOPO -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="fw-bold">Painel Administrativo</h1>
                    <a href="dashboard.html" class="btn btn-brown">Atualizar</a>
                </div>

                <!-- CARDS -->
                <div class="row g-4 mb-4">

                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card text-center p-3">
                            <h6>Pedidos</h6>
                            <h3>12</h3>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card text-center p-3">
                            <h6>Clientes</h6>
                            <h3>8</h3>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card text-center p-3">
                            <h6>Estoque</h6>
                            <h3>35</h3>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6 col-lg-3">
                        <div class="card text-center p-3">
                            <h6>Saldo</h6>
                            <h3>R$ 2.450</h3>
                        </div>
                    </div>

                </div>

                <!-- CONTEUDO -->
                <div class="conteudo">
                    <h2>Bem-vindo ao sistema CaBel Bordados</h2>
                    <p>Aqui você pode gerenciar pedidos, clientes, estoque e finanças.</p>
                </div>

            </main>

        </div>

    </div>

    <!-- OVERLAY AQUI -->
    <div class="overlay" onclick="toggleSidebar()"></div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.overlay');
            const btn = document.querySelector('.menu-toggle');

            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');

            // 👇 agora não quebra layout
            btn.classList.toggle('hidden');
        }
    </script>
    <script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>

</html>
