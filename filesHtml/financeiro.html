<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - CaBel Bordados</title>

    <!-- Bootstrap -->
    <link href="../assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="../style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
    <div class="header-mobile">

        <button class="menu-toggle" onclick="toggleSidebar()">
            ☰
        </button>

        <img src="../imgs/logo2.png" class="logo-header">

    </div>

    <!-- SIDEBAR -->
    <aside class="col-md-3 col-lg-2 sidebar">

        <img src="../imgs/logo.png" class="logo">

        <div class="menu">
            <a href="dashboard.html" class="menu-btn">Dashboard</a>
            <a href="clientes.html" class="menu-btn">Clientes</a>
            <a href="pedidos.html" class="menu-btn">Pedidos</a>
            <a href="estoque.html" class="menu-btn">Estoque</a>
            <a href="financeiro.html" class="menu-btn active">Financeiro</a>
            <a href="login.html" class="menu-btn logout">Sair</a>
        </div>

    </aside>


    <main class="main" id="main">

        <header class="topbar">
            <h1>Financeiro</h1>
        </header>

        <section class="cards-financeiro">

            <div class="card-fin">
                <h3>Total Recebido</h3>
                <p>R$ 2.500</p>
            </div>

            <div class="card-fin">
                <h3>Total a Receber</h3>
                <p>R$ 1.200</p>
            </div>

            <div class="card-fin">
                <h3>Custos</h3>
                <p>R$ 1.800</p>
            </div>

            <div class="card-fin">
                <h3>Lucro</h3>
                <p>R$ 700</p>
            </div>

        </section>
        <section class="graficos row mt-4">

            <div class="grafico-box col-md-4">
                <canvas id="graficoResumo"></canvas>
            </div>

            <div class="grafico-box col-md-4">
                <canvas id="graficoCustos"></canvas>
            </div>

            <div class="grafico-box grafico-full col-md-3">
                <canvas id="graficoPagamentos"></canvas>
            </div>

        </section>

    </main>

    <!-- OVERLAY AQUI -->
    <div class="overlay" onclick="toggleSidebar()"></div>

    <script>
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.overlay');
            const btn = document.querySelector('.menu-toggle');

            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');

            // 👇 agora não quebra layout
            btn.classList.toggle('hidden');
        }
    </script>
    <script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../filesJS/financeiro.js"></script>

</body>

</html>
