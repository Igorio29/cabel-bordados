<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - CaBel Bordados</title>

    <!-- Bootstrap -->
    <link href="../assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../style.css">

</head>

<body>

    <body class="login-page">

    <div class="container d-flex justify-content-center align-items-center login-wrapper">

        <div class="login-box text-center">

            <img src="../imgs/logo.png" class="logo">

            <h2>Entrar no Sistema</h2>

            <form id="loginForm">

                <div class="mb-3">
                    <input type="text" id="usuario" class="form-control" placeholder="Usuário" required>
                </div>

                <div class="mb-3">
                    <input type="password" id="senha" class="form-control" placeholder="Senha" required>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    Entrar
                </button>

                <p id="mensagem"></p>

            </form>
        </div>

    </div>
    <script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../filesJS/login.js"></script>
</body>

</html>
